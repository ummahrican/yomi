# Production stack for a single small VPS (1GB is plenty).
#   1. Point an A record (e.g. api.yourdomain.com) at the VPS IP.
#   2. cp .env.production.example .env.production  and fill in the secrets.
#   3. docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Caddy terminates TLS (auto Let's Encrypt) and proxies to the API. Postgres has
# NO published port — it is only reachable on the internal compose network.
services:
  db:
    image: postgres:16
    container_name: yomi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: yomi-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      GRAVITY: ${GRAVITY:-1.6}
      SOURCE_APPROVE_VOTES: ${SOURCE_APPROVE_VOTES:-10}
      INGEST_ENABLED: ${INGEST_ENABLED:-true}
      INGEST_CONTACT_URL: ${INGEST_CONTACT_URL}
    # No published port: only Caddy (same network) reaches the API.
    expose:
      - "3000"

  caddy:
    image: caddy:2
    container_name: yomi-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
