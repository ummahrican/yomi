packages:
  - "apps/*"
  - "packages/*"

# Pin @vitejs/plugin-react to a Vite 6-compatible major. WXT 0.19 uses Vite 6,
# but the default resolution pulls plugin-react 6 which requires Vite 7
# (it imports the "vite/internal" subpath that only exists in Vite 7+).
overrides:
  "@vitejs/plugin-react": "^4.4.1"

# pnpm records dependency build-script approval here. We explicitly do NOT run
# these: esbuild ships prebuilt binaries via its platform-specific optional deps
# (its postinstall isn't needed), and spawn-sync is a legacy shim unused on
# Node >=20. Without an explicit decision a clean `pnpm install` fails with
# ERR_PNPM_IGNORED_BUILDS (this is what broke CI). These MUST be real booleans —
# never leave pnpm's "set this to true or false" stub here.
allowBuilds:
  esbuild: false
  spawn-sync: false
