name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build (api, shared, extension x2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Build (shared + api typecheck + extension Chromium)
        run: pnpm -r build

      - name: Build extension (Firefox)
        run: pnpm --filter @daily-alt/extension build:firefox

      - name: Package extension zips
        run: |
          pnpm --filter @daily-alt/extension zip
          pnpm --filter @daily-alt/extension zip:firefox

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: apps/extension/.output/*.zip
          if-no-files-found: warn
