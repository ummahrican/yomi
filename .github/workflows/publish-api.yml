name: Publish API image (GHCR)

# Builds the Fastify API image and pushes it to GitHub Container Registry so
# Dokploy can deploy a prebuilt image instead of building on the VPS.
#
# The build context is the REPO ROOT (the Dockerfile does `COPY . .`, so the whole
# pnpm workspace + packages/shared must be present) with -f apps/api/Dockerfile.
#
# Image:  ghcr.io/ummahrican/yomi/api
# Tags:   latest (main), <short-sha> (every build, for rollback), and semver on v* tags.
#
# One-time: the published package is PRIVATE by default. Either make it public
# (repo → Packages → api → Package settings → Change visibility) or add a ghcr.io
# pull credential (a PAT with read:packages) in Dokploy's registry settings.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Don't waste a build on a run that's already been superseded on the same ref.
concurrency:
  group: publish-api-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api # -> ghcr.io/ummahrican/yomi/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64 # most VPS hosts are amd64; add linux/arm64 here if yours is ARM
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
