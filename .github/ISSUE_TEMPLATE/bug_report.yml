name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please **don't report security vulnerabilities here** — see [SECURITY.md](https://github.com/ummahrican/yomi/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a new tab
        2. ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Extension (new-tab UI)
        - API / backend
        - Sync
        - Admin dashboard
        - Not sure
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser & version
      placeholder: "e.g. Chrome 126 / Firefox 128, macOS 14"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console logs / screenshots
      description: Paste any relevant browser console or API logs (redact anything sensitive).
      render: shell
    validations:
      required: false
